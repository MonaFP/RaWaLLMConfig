name: Bug report
description: Report a reproducible problem in RaWaLLMConfig.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which RaWaLLMConfig version are you using?
      placeholder: "0.1.3"
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Which Windows version and build are you using?
      placeholder: "Windows 11 24H2, build 26100"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots or logs
      description: Add screenshots or relevant log excerpts if they help. Do not include secrets, tokens, or private config values.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked that I am using the latest public release.
          required: true
        - label: I removed secrets, tokens, API keys, and private config values from this report.
          required: true
